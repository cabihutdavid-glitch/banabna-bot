<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banana — Tu asistente personal</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e10;
      --surface: #1a1a1e;
      --surface2: #242428;
      --accent: #f5c842;
      --accent2: #f0a500;
      --text: #f0ede8;
      --muted: #888;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .chat-container {
      width: 100%;
      max-width: 620px;
      height: 88vh;
      max-height: 760px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: 24px;
      border: 1px solid #2e2e34;
      overflow: hidden;
    }
    .chat-header {
      padding: 20px 24px 18px;
      border-bottom: 1px solid #2e2e34;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .avatar {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
    }
    .header-info h1 {
      font-family: var(--font-head);
      font-size: 18px; font-weight: 700;
      color: var(--text); letter-spacing: -0.3px;
    }
    .status {
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); margin-top: 2px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #3ecf6e; }
    .messages {
      flex: 1; overflow-y: auto;
      padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      scrollbar-width: thin; scrollbar-color: #2e2e34 transparent;
    }
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14.5px; line-height: 1.6;
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--surface2);
      border: 1px solid #2e2e34;
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #0e0e10;
      border-bottom-right-radius: 4px;
      font-weight: 500;
    }
    .msg.typing { color: var(--muted); font-style: italic; }
    .suggestions {
      padding: 0 20px 12px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .suggestion-btn {
      font-size: 12.5px; padding: 6px 12px;
      background: transparent;
      border: 1px solid #2e2e34;
      border-radius: 20px;
      color: var(--muted); cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.15s;
    }
    .suggestion-btn:hover { border-color: var(--accent); color: var(--accent); }
    .input-area {
      padding: 14px 16px;
      border-top: 1px solid #2e2e34;
      display: flex; gap: 10px; align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid #2e2e34;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: var(--font-body);
      resize: none;
      min-height: 44px; max-height: 120px;
      transition: border-color 0.15s;
      outline: none;
    }
    #user-input:focus { border-color: var(--accent); }
    #user-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 44px; height: 44px;
      border-radius: 12px; border: none;
      background: var(--accent); color: #0e0e10;
      font-size: 18px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover  { background: var(--accent2); }
    #send-btn:active { transform: scale(0.95); }
  </style>
</head>
<body>
<div class="chat-container">
  <div class="chat-header">
    <div class="avatar">🍌</div>
    <div class="header-info">
      <h1>Banana</h1>
      <div class="status">
        <div class="status-dot"></div>
        Asistente personal activo
      </div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      ¡Hola! Soy <strong>Banana</strong>, tu asistente personal 🍌<br>
      ¿En qué te ayudo hoy?
    </div>
  </div>

  <div class="suggestions">
    <button class="suggestion-btn" onclick="quickSend('Ayúdame a organizar mi día')">Organizar mi día</button>
    <button class="suggestion-btn" onclick="quickSend('Dame un consejo de productividad')">Consejo productivo</button>
    <button class="suggestion-btn" onclick="quickSend('Hazme una lista de tareas')">Lista de tareas</button>
    <button class="suggestion-btn" onclick="quickSend('¿Qué puedes hacer?')">¿Qué puedes hacer?</button>
  </div>

  <div class="input-area">
    <textarea id="user-input" placeholder="Escríbele a Banana..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  let history = [];

  function addMsg(role, text) {
    const msgs = document.getElementById('messages');
    const div  = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = text.replace(/\n/g, '<br>');
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function quickSend(text) {
    document.getElementById('user-input').value = text;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text  = input.value.trim();
    if (!text) return;
    input.value = '';
    input.style.height = 'auto';

    addMsg('user', text);
    history.push({ role: 'user', content: text });

    const typing = addMsg('bot', 'Banana está escribiendo...');
    typing.classList.add('typing');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      typing.innerHTML = data.reply.replace(/\n/g, '<br>');
      typing.classList.remove('typing');
      history.push({ role: 'assistant', content: data.reply });
    } catch (err) {
      typing.textContent = '❌ Error: ' + err.message;
      typing.classList.remove('typing');
    }
  }

  document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>

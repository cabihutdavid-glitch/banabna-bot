<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#f5c842"/>
  <title>Banabna</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="/manifest.json">
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
  <style>
    :root{--bg:#0e0e10;--surface:#1a1a1e;--surface2:#242428;--accent:#f5c842;--accent2:#f0a500;--text:#f0ede8;--muted:#888;--border:#2e2e34;--danger:#e74c3c;}
    [data-theme="light"]{--bg:#f5f5f0;--surface:#fff;--surface2:#f0ede8;--accent:#f0a500;--accent2:#d4900a;--text:#1a1a1e;--muted:#666;--border:#ddd;}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .3s}
    .app{width:100%;height:100%;display:flex;flex-direction:column;background:var(--surface);overflow:hidden}

    /* Header */
    .header{height:50px;padding:0 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:10px}
    .logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .title{font-weight:700;font-size:15px}
    .greeting{font-size:11px;color:var(--muted);margin-left:10px}

    /* Menu button */
    .menu-btn{width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}

    /* Dropdown menu */
    .menu-drop{position:absolute;top:50px;right:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:6px;display:none;flex-direction:column;gap:2px;min-width:160px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,0.3)}
    .menu-drop.show{display:flex}
    .menu-item{padding:10px 12px;font-size:13px;border-radius:8px;cursor:pointer;text-align:left;background:none;border:none;color:var(--text);width:100%}
    .menu-item:hover{background:var(--surface2)}

    /* Tabs */
    .tabs{height:44px;padding:0 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;gap:4px;flex-shrink:0}
    .tab{padding:0 14px;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

    /* Messages */
    .msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
    .msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.4}
    .msg.bot{background:var(--surface2);border:1px solid var(--border);align-self:flex-start;border-radius:14px 14px 14px 4px}
    .msg.user{background:var(--accent);color:#0e0e10;align-self:flex-end;border-radius:14px 14px 4px 14px}
    .msg img{max-width:100%;border-radius:8px}

    /* Input area */
    .iarea{padding:10px 12px;background:var(--surface2);border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
    #ui{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;color:var(--text);font-family:inherit;resize:none;min-height:40px;max-height:100px;outline:none}
    #ui:focus{border-color:var(--accent)}
    .sbtn{width:40px;height:40px;background:var(--accent);border:none;border-radius:10px;color:#0e0e10;font-size:16px;cursor:pointer}

    /* Panel */
    .panel{position:absolute;inset:0;background:var(--surface);z-index:50;display:none;flex-direction:column}
    .panel-header{height:50px;padding:0 12px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
    .back-btn{width:36px;height:36px;background:var(--surface);border:1px solid var(--border);border-radius:8px;cursor:pointer}
    .panel-title{font-weight:600;font-size:15px}
    .panel-content{flex:1;overflow-y:auto;padding:12px}

    /* Buttons */
    .btn{background:var(--accent);color:#0e0e10;border:none;border-radius:8px;padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer}

    /* Input setup */
    .setup-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;color:var(--text);margin-bottom:12px}

    /* Cards & items */
    .card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
    .item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}

    /* Small buttons */
    .small-btn{padding:8px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted);cursor:pointer}

    /* Attach row */
    .attach-row{display:none;padding:0 12px 8px;gap:8px}
    .attach-row.show{display:flex}

    /* Suggestions */
    .sugs{padding:0 12px 8px;display:flex;gap:6px;flex-wrap:wrap}
    .sug{padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--muted)}

    /* Status bar */
    .wbar{padding:6px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}

    /* Player bar */
    .player-bar{display:none;position:fixed;bottom:60px;left:0;right:0;background:var(--surface2);border-top:1px solid var(--border);padding:8px 12px;gap:10px;align-items:center}
    .player-bar.show{display:flex}

    /* Calc */
    .calc-display{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:22px;text-align:right;font-weight:700}
    .calc-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .calc-btn{padding:14px;font-size:16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text)}
    .calc-btn.op{background:var(--accent);color:#0e0e10}

    /* Video */
    video{width:100%;border-radius:10px;background:#000}

    /* Timer */
    .timer-display{font-size:48px;font-weight:700;color:var(--accent);text-align:center;margin:10px 0}
    .timer-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}

    /* PC */
    @media(min-width:600px){
      body{padding:20px}
      .app{height:90vh;max-height:700px;border-radius:16px;border:1px solid var(--border)}
      .header{height:56px;padding:0 16px}
      .menu-btn{width:40px;height:40px}
      .menu-drop{right:16px;top:56px}
      .tabs{height:48px;padding:0 16px}
      .tab{padding:0 18px;font-size:13px}
      .msgs{padding:16px}
      .msg{padding:12px 16px;font-size:15px}
      .iarea{padding:12px 16px}
      #ui{padding:12px 14px;font-size:15px}
      .sbtn{width:44px;height:44px;border-radius:12px}
      .panel-content{padding:16px}
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Setup Panel -->
  <div class="panel" id="setup-panel" style="display:flex;">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:16px;">
      <div style="font-size:48px;">🍌</div>
      <div style="font-size:24px;font-weight:700;">Banabna</div>
      <p style="color:var(--muted);font-size:14px;">¿Cómo te llamas?</p>
      <input class="setup-input" id="name-input" placeholder="Tu nombre" style="text-align:center;max-width:250px;">
      <button class="btn" onclick="saveName()" style="width:250px;">Continuar</button>
    </div>
  </div>

  <!-- Menu Dropdown -->
  <div class="menu-drop" id="menu-drop">
    <button class="menu-item" onclick="openPanel('conv-panel')">💱 Monedas</button>
    <button class="menu-item" onclick="openCalc()">🧮 Calculadora</button>
    <button class="menu-item" onclick="openPanel('trans-panel')">🌐 Traductor</button>
    <button class="menu-item" onclick="openPanel('study-panel')">📚 Estudio</button>
    <button class="menu-item" onclick="openPanel('cam-panel')">📷 Cámara</button>
    <button class="menu-item" onclick="openPanel('history-panel')">🕐 Historial</button>
    <button class="menu-item" onclick="toggleTheme()">🌙 Tema</button>
    <button class="menu-item" onclick="toggleMusic()">🎵 Lofi</button>
    <button class="menu-item" onclick="newChat()" style="color:var(--danger);">✏️ Nuevo chat</button>
  </div>

  <!-- History Panel -->
  <div class="panel" id="history-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('history-panel')">←</button>
      <span class="panel-title">Historial</span>
    </div>
    <div class="panel-content" id="history-list"></div>
  </div>

  <!-- Calc Panel -->
  <div class="panel" id="calc-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('calc-panel')">←</button>
      <span class="panel-title">Calculadora</span>
    </div>
    <div class="panel-content">
      <div class="calc-display" id="calc-display">0</div>
      <div class="calc-btns">
        <button class="calc-btn" onclick="calc('C')">C</button>
        <button class="calc-btn" onclick="calc('(')">(</button>
        <button class="calc-btn" onclick="calc(')')">)</button>
        <button class="calc-btn op" onclick="calc('/')">÷</button>
        <button class="calc-btn" onclick="calc('7')">7</button>
        <button class="calc-btn" onclick="calc('8')">8</button>
        <button class="calc-btn" onclick="calc('9')">9</button>
        <button class="calc-btn op" onclick="calc('*')">×</button>
        <button class="calc-btn" onclick="calc('4')">4</button>
        <button class="calc-btn" onclick="calc('5')">5</button>
        <button class="calc-btn" onclick="calc('6')">6</button>
        <button class="calc-btn op" onclick="calc('-')">−</button>
        <button class="calc-btn" onclick="calc('1')">1</button>
        <button class="calc-btn" onclick="calc('2')">2</button>
        <button class="calc-btn" onclick="calc('3')">3</button>
        <button class="calc-btn op" onclick="calc('+')">+</button>
        <button class="calc-btn" onclick="calc('0')">0</button>
        <button class="calc-btn" onclick="calc('.')">.</button>
        <button class="calc-btn" onclick="calc('%')">%</button>
        <button class="calc-btn" onclick="calc('^')">^</button>
      </div>
    </div>
  </div>

  <!-- Study Panel -->
  <div class="panel" id="study-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('study-panel')">←</button>
      <span class="panel-title">Estudio</span>
    </div>
    <div class="panel-content">
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="timer-btns">
        <button class="small-btn" onclick="setTimer(25)">25</button>
        <button class="small-btn" onclick="setTimer(5)">5</button>
        <button class="small-btn" onclick="setTimer(15)">15</button>
        <button class="small-btn" onclick="toggleTimer()">▶/⏸</button>
      </div>
      <textarea class="setup-input" id="study-notes" placeholder="Notas..." style="min-height:200px;margin-top:16px;"></textarea>
      <button class="btn" onclick="saveNotes()" style="margin-top:8px;width:100%;">💾 Guardar</button>
    </div>
  </div>

  <!-- Camera Panel -->
  <div class="panel" id="cam-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('cam-panel')">←</button>
      <span class="panel-title">Cámara</span>
    </div>
    <div class="panel-content">
      <video id="cam-video" autoplay playsinline></video>
      <canvas id="cam-canvas" style="display:none;"></canvas>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn" onclick="openCamera()" style="flex:1;">📷 Abrir</button>
        <button class="btn" onclick="takePhoto()" style="flex:1;">⭕ Capturar</button>
      </div>
    </div>
  </div>

  <!-- Translator Panel -->
  <div class="panel" id="trans-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('trans-panel')">←</button>
      <span class="panel-title">Traductor</span>
    </div>
    <div class="panel-content">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <select id="trans-from" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);"><option value="es">Español</option><option value="en">English</option></select>
        <span style="align-self:center;">⇄</span>
        <select id="trans-to" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);"><option value="en">English</option><option value="es">Español</option></select>
      </div>
      <textarea class="setup-input" id="trans-input" placeholder="Texto..." style="min-height:100px;"></textarea>
      <button class="btn" onclick="doTranslate()" style="width:100%;margin-top:8px;">🔄 Traducir</button>
      <div class="card" id="trans-output" style="min-height:80px;margin-top:12px;"></div>
    </div>
  </div>

  <!-- Currencies Panel -->
  <div class="panel" id="conv-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('conv-panel')">←</button>
      <span class="panel-title">Monedas</span>
    </div>
    <div class="panel-content">
      <input type="number" id="conv-amount" class="setup-input" value="1" oninput="convertCurrency()">
      <select id="conv-from" class="setup-input" onchange="convertCurrency()">
        <option value="USD">USD - Dólar</option>
        <option value="COP" selected>COP - Peso</option>
        <option value="EUR">EUR - Euro</option>
      </select>
      <select id="conv-to" class="setup-input" onchange="convertCurrency()">
        <option value="USD" selected>USD - Dólar</option>
        <option value="COP">COP - Peso</option>
        <option value="EUR">EUR - Euro</option>
      </select>
      <div style="text-align:center;font-size:24px;font-weight:700;color:var(--accent);padding:20px;" id="conv-result">...</div>
    </div>
  </div>

  <!-- Main Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🍌</div>
      <span class="title">Banabna</span>
      <span class="greeting" id="greeting"></span>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>

  <!-- Status bar -->
  <div class="wbar">
    <span>📅 <span id="wdate">--</span></span>
    <span>🕐 <span id="wtime">--:--</span></span>
    <span>📻 <span id="pmusic">Lofi</span></span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="setTab('chat',this)">💬 Chat</button>
    <button class="tab" onclick="setTab('img',this)">📷</button>
    <button class="tab" onclick="setTab('doc',this)">📄</button>
  </div>

  <!-- Messages -->
  <div class="msgs" id="msgs">
    <div class="msg bot">¡Hola! Soy <strong>Banabna</strong> 🍌 ¿En qué te ayudo?</div>
  </div>

  <!-- Attach -->
  <div class="attach-row" id="attach-row">
    <button class="small-btn" onclick="document.getElementById('img-input').click()">📷 Imagen</button>
    <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImage(event)">
  </div>

  <!-- Suggestions -->
  <div class="sugs">
    <button class="sug" onclick="quickSend('Organiza mi día')">Organizar</button>
    <button class="sug" onclick="quickSend('Consejo')">Consejo</button>
    <button class="sug" onclick="quickSend('Tareas')">Tareas</button>
  </div>

  <!-- Input -->
  <div class="iarea">
    <textarea id="ui" placeholder="Escríbele a Banabna..." rows="1"></textarea>
    <button class="sbtn" onclick="sendMessage()">➤</button>
  </div>

  <!-- Player -->
  <div class="player-bar" id="player-bar">
    <span style="flex:1;font-size:13px;" id="player-title">Lofi</span>
    <button class="small-btn" onclick="toggleMusic()">▶/⏸</button>
    <button class="small-btn" onclick="stopMusic()">⏹</button>
  </div>

</div>
<script>
let chatHistory=[], userName=localStorage.getItem('banabna_name')||'', isDark=localStorage.getItem('banabna_theme')==='light', currentTab='chat', pendingImage=null, timerSec=25*60, timerRun=false, timerInt=null, player=null, camStream=null, calcExpr='';

const API='/';

function init(){
  if(userName){
    document.getElementById('setup-panel').style.display='none';
    document.getElementById('greeting').textContent=userName;
  }
  applyTheme();
  setInterval(()=>{
    const d=new Date();
    document.getElementById('wtime').textContent=d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('wdate').textContent=d.toLocaleDateString('es-CO',{day:'numeric',month:'short'});
  },1000);
  const sc=localStorage.getItem('banabna_chat');
  if(sc)try{JSON.parse(sc).forEach(m=>addMsg(m.role,m.content));}catch{}
}

function saveName(){
  const n=document.getElementById('name-input').value.trim();
  if(!n)return alert('Escribe tu nombre');
  userName=n;localStorage.setItem('banabna_name',n);
  document.getElementById('setup-panel').style.display='none';
  document.getElementById('greeting').textContent=n;
}

function applyTheme(){document.documentElement.setAttribute('data-theme',isDark?'dark':'light');}
function toggleTheme(){isDark=!isDark;localStorage.setItem('banabna_theme',isDark?'light':'dark');applyTheme();}

function toggleMenu(){document.getElementById('menu-drop').classList.toggle('show');}

function openPanel(id){document.getElementById(id).style.display='flex';}
function closePanel(id){document.getElementById(id).style.display='none';}
function openCalc(){openPanel('calc-panel');}

function setTab(t,el){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('attach-row').classList.toggle('show',t==='img');
}

function addMsg(role,text){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=text.replace(/\n/g,'<br>');
  document.getElementById('msgs').appendChild(d);
  document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
}

function quickSend(t){document.getElementById('ui').value=t;sendMessage();}

async function sendMessage(){
  const inp=document.getElementById('ui');
  let txt=inp.value.trim();
  if(!txt&&!pendingImage)return;
  inp.value='';
  addMsg('user',txt+(pendingImage?' 📷':''));
  chatHistory.push({role:'user',content:txt});
  const t=addMsg('bot','Escribo...');
  try{
    const res=await fetch(API+'chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistory,userName,hasImage:!!pendingImage,image:pendingImage})});
    const d=await res.json();
    t.innerHTML=d.reply.replace(/\n/g,'<br>');
    chatHistory.push({role:'assistant',content:d.reply});
    localStorage.setItem('banabna_chat',JSON.stringify(chatHistory));
  }catch(e){t.innerHTML='Error: '+e.message;}
  pendingImage=null;
}

function handleImage(e){
  const f=e.target.files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{pendingImage={data:ev.target.result.split(',')[1],type:f.type};};
  r.readAsDataURL(f);
}

function newChat(){
  chatHistory=[];
  document.getElementById('msgs').innerHTML='<div class="msg bot">¡Nuevo chat! 🍌</div>';
  localStorage.removeItem('banabna_chat');
  toggleMenu();
}

function renderHistory(){
  const s=JSON.parse(localStorage.getItem('banabna_history')||'[]');
  document.getElementById('history-list').innerHTML=s.length?s.map(x=>'<div class="item" onclick="loadHistory('+x.id+')"><span>'+x.preview+'</span><span style="color:var(--muted);font-size:11px;">'+new Date(x.date).toLocaleDateString()+'</span></div>').join(''):'<p style="color:var(--muted);text-align:center;">Sin historial</p>';
}
function loadHistory(id){
  const s=JSON.parse(localStorage.getItem('banabna_history')||'[]');
  const h=s.find(x=>x.id===id);
  if(h){chatHistory=h.messages;document.getElementById('msgs').innerHTML='';h.messages.forEach(m=>addMsg(m.role,m.content));}
  closePanel('history-panel');
}

// Calc
function calc(v){
  const d=document.getElementById('calc-display');
  if(v==='C'){calcExpr='';d.innerText='0';}
  else if(v==='='){try{d.innerText=eval(calcExpr.replace(/\^/,'**'));calcExpr=d.innerText;}catch{d.innerText='Error';calcExpr='';}}
  else{calcExpr+=v;d.innerText=calcExpr;}
}

// Timer
function setTimer(m){timerSec=m*60;timerRun=false;document.getElementById('timer-display').innerText=m+':00';}
function toggleTimer(){
  if(timerRun){clearInterval(timerInt);timerRun=false;}
  else{timerRun=true;timerInt=setInterval(()=>{timerSec--;document.getElementById('timer-display').innerText=Math.floor(timerSec/60)+':'+(timerSec%60).toString().padStart(2,'0');if(timerSec<=0){clearInterval(timerInt);timerRun=false;alert('¡Listo!');}},1000);}
}
function saveNotes(){localStorage.setItem('banabna_notes',document.getElementById('study-notes').value);alert('Guardado');}
const sn=localStorage.getItem('banabna_notes');if(sn)document.getElementById('study-notes').value=sn;

// Camera
async function openCamera(){try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});document.getElementById('cam-video').srcObject=camStream;}catch{alert('No cámara');}}
function takePhoto(){if(!camStream)return;const v=document.getElementById('cam-video');const c=document.getElementById('cam-canvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);pendingImage={data:c.toDataURL('image/png').split(',')[1],type:'image/png'};closePanel('cam-panel');setTab('img',document.querySelector('.tab'));}

// Currency
async function convertCurrency(){
  const a=parseFloat(document.getElementById('conv-amount').value)||0;
  const f=document.getElementById('conv-from').value;
  const t=document.getElementById('conv-to').value;
  try{const d=await fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json());document.getElementById('conv-result').innerText=(a/d.rates[f]*d.rates[t]).toFixed(2)+' '+t;}catch{}
}

// Music
function toggleMusic(){
  const b=document.getElementById('player-bar');
  if(b.classList.contains('show')){player.pause();b.classList.remove('show');document.getElementById('pmusic').innerText='Lofi';player=null;}
  else{player=new Audio('https://streams.ilovemusic.de/iloveradio17.mp3');player.loop=true;player.play().catch(()=>{});b.classList.add('show');document.getElementById('pmusic').innerText='▶';}
}
function stopMusic(){const b=document.getElementById('player-bar');if(player){player.pause();player=null;}b.classList.remove('show');document.getElementById('pmusic').innerText='Lofi';}

// Translation
async function doTranslate(){
  const t=document.getElementById('trans-input').value;
  if(!t)return;
  document.getElementById('trans-output').innerText='...';
  try{const res=await fetch(API+'chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:'Translate from '+(document.getElementById('trans-from').value)+' to '+(document.getElementById('trans-to').value)+': '+t}]})});
  const d=await res.json();document.getElementById('trans-output').innerText=d.reply;}catch{document.getElementById('trans-output').innerText='Error';}
}

init();
document.getElementById('ui').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});
</script>
</body>
</html>

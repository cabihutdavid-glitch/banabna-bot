<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#141416"/>
  <title>Banabna</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="/manifest.json">
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
  <style>
    :root{--bg:#0a0a0c;--surface:#141416;--surface2:#1c1c20;--surface3:#242428;--accent:#e6b84c;--accent2:#d4a53c;--text:#e8e6e2;--muted:#6a6a70;--border:#2a2a30;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.4);}
    [data-theme="light"]{--bg:#f4f4f2;--surface:#fff;--surface2:#f8f8f6;--surface3:#eee;--accent:#d4a53c;--accent2:#c4942c;--text:#1a1a1c;--muted:#888;--border:#ddd;}
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;touch-action:manipulation;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;transition:background .3s}
    .app{width:100%;height:100%;display:flex;flex-direction:column;background:var(--surface);overflow:hidden;padding-bottom:env(safe-area-inset-bottom)}

    /* Header */
    .header{height:52px;padding:0 16px;background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .header-left{display:flex;align-items:center;gap:10px}
    .logo{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .title{font-weight:600;font-size:15px;letter-spacing:-0.3px}

    /* Menu */
    .menu-btn{width:32px;height:32px;background:var(--surface2);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--muted)}
    .menu-drop{position:absolute;top:52px;right:12px;background:var(--surface2);border-radius:12px;padding:6px;display:none;flex-direction:column;gap:2px;min-width:150px;z-index:100;box-shadow:var(--shadow)}
    .menu-drop.show{display:flex}
    .menu-item{padding:10px 14px;font-size:13px;border-radius:8px;cursor:pointer;text-align:left;background:none;border:none;color:var(--text);width:100%;font-family:inherit}
    .menu-item:hover{background:var(--surface3)}

    /* Messages */
    .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px}
    .msg{max-width:82%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45}
    .msg.bot{background:var(--surface2);align-self:flex-start;border-radius:16px 16px 16px 6px}
    .msg.user{background:var(--accent);color:var(--bg);align-self:flex-end;border-radius:16px 16px 6px 16px;font-weight:500}
    .msg img{max-width:100%;border-radius:10px}

    /* Input - fixed en bottom para mobile */
    .iarea{position:fixed;bottom:0;left:0;right:0;padding:10px 12px 14px;background:var(--surface);display:flex;gap:8px;align-items:flex-end;z-index:10}
    #ui{flex:1;background:var(--surface2);border:none;border-radius:12px;padding:10px 14px;font-size:16px;color:var(--text);font-family:inherit;resize:none;min-height:44px;max-height:100px;outline:none;line-height:1.4;-webkit-appearance:none}
    #ui::placeholder{color:var(--muted)}
    .sbtn{width:44px;height:44px;background:var(--accent);border:none;border-radius:10px;color:var(--bg);font-size:18px;cursor:pointer;font-weight:600}
    .msgs{padding:16px 16px 70px}

    /* Tabs - minimal */
    .tabs{display:none}

    /* Status - hiding more */
    .wbar{display:none}

    /* Suggestions - cleaner */
    .sugs{display:none}

    /* Attach row - unused */
    .attach-row{display:none}

    /* Panel */
    .panel{position:absolute;inset:0;background:var(--surface);z-index:50;display:none;flex-direction:column}
    .panel-header{height:52px;padding:0 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
    .back-btn{width:32px;height:32px;background:var(--surface2);border:none;border-radius:8px;cursor:pointer;font-size:16px}
    .panel-title{font-weight:600;font-size:14px}
    .panel-content{flex:1;overflow-y:auto;padding:16px}

    /* Buttons */
    .btn{background:var(--accent);color:var(--bg);border:none;border-radius:10px;padding:12px 18px;font-size:13px;font-weight:600;cursor:pointer}

    /* Input setup */
    .setup-input{width:100%;background:var(--surface2);border:none;border-radius:10px;padding:12px 14px;font-size:14px;color:var(--text);margin-bottom:12px}

    /* Cards */
    .card{background:var(--surface2);border-radius:12px;padding:14px;margin-bottom:10px}
    .item{background:var(--surface2);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}

    /* Small buttons */
    .small-btn{padding:8px 14px;background:var(--surface2);border:none;border-radius:8px;font-size:12px;color:var(--text);cursor:pointer}

    /* Player bar */
    .player-bar{display:none;position:fixed;bottom:60px;left:0;right:0;background:var(--surface2);padding:10px 14px;gap:10px;align-items:center;z-index:20}
    .player-bar.show{display:flex}

    /* Calc - minimal */
    .calc-display{background:var(--surface2);border-radius:10px;padding:16px;font-size:24px;text-align:right;font-weight:600}
    .calc-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
    .calc-btn{padding:16px;font-size:16px;border-radius:10px;border:none;background:var(--surface2);color:var(--text)}
    .calc-btn.op{background:var(--accent);color:var(--bg)}

    /* Video */
    video{width:100%;border-radius:10px;background:#000}

    /* Timer */
    .timer-display{font-size:52px;font-weight:600;color:var(--accent);text-align:center;margin:20px 0}
    .timer-btns{display:flex;gap:8px;justify-content:center}

    /* PC */
    @media(min-width:600px){
      body{padding:24px}
      .app{height:92vh;max-height:720px;max-width:420px;border-radius:20px;border:1px solid var(--border)}
      .header{height:56px;padding:0 18px}
      .menu-btn{width:34px;height:34px}
      .menu-drop{right:18px;top:56px}
      .msgs{padding:18px 18px 70px}
      .iarea{position:relative;padding:10px 16px 14px}
      #ui{padding:12px 16px;font-size:15px;min-height:44px}
      .sbtn{width:42px;height:42px;border-radius:12px}
      .panel-content{padding:18px}
      .panel-header{height:56px}
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Setup Panel -->
  <div class="panel" id="setup-panel" style="display:flex;">
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:20px;flex:1">
      <div style="font-size:56px;">🍌</div>
      <div style="font-size:26px;font-weight:600;letter-spacing:-0.5px;">Banabna</div>
      <p style="color:var(--muted);font-size:14px;">Tu asistente personal</p>
      <input class="setup-input" id="name-input" placeholder="¿Cómo te llamas?" style="text-align:center;">
      <button class="btn" onclick="(function(){var n=document.getElementById('name-input').value.trim();if(!n){alert('Escribe tu nombre');return;}localStorage.setItem('banabna_name',n);var p=document.getElementById('setup-panel');p.style.display='none';p.style.visibility='hidden';})()" style="width:100%;">Continuar</button>
    </div>
  </div>

  <!-- Menu Dropdown -->
  <div class="menu-drop" id="menu-drop">
    <button class="menu-item" onclick="openPanel('conv-panel');toggleMenu()">Monedas</button>
    <button class="menu-item" onclick="openCalc();toggleMenu()">Calculadora</button>
    <button class="menu-item" onclick="openPanel('trans-panel');toggleMenu()">Traductor</button>
    <button class="menu-item" onclick="openPanel('study-panel');toggleMenu()">Notas</button>
    <button class="menu-item" onclick="openPanel('cam-panel');toggleMenu()">Cámara</button>
    <button class="menu-item" onclick="toggleTheme();toggleMenu()">Tema</button>
    <button class="menu-item" onclick="toggleMusic();toggleMenu()">Música</button>
    <button class="menu-item" onclick="newChat();toggleMenu()" style="color:var(--accent);">Nuevo chat</button>
  </div>

  <!-- History Panel -->
  <div class="panel" id="history-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('history-panel')">←</button>
      <span class="panel-title">Historial</span>
    </div>
    <div class="panel-content" id="history-list"></div>
  </div>

  <!-- Calc Panel -->
  <div class="panel" id="calc-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('calc-panel')">←</button>
      <span class="panel-title">Calculadora</span>
    </div>
    <div class="panel-content">
      <div class="calc-display" id="calc-display">0</div>
      <div class="calc-btns">
        <button class="calc-btn" onclick="calc('C')">C</button>
        <button class="calc-btn" onclick="calc('(')">(</button>
        <button class="calc-btn" onclick="calc(')')">)</button>
        <button class="calc-btn op" onclick="calc('/')">÷</button>
        <button class="calc-btn" onclick="calc('7')">7</button>
        <button class="calc-btn" onclick="calc('8')">8</button>
        <button class="calc-btn" onclick="calc('9')">9</button>
        <button class="calc-btn op" onclick="calc('*')">×</button>
        <button class="calc-btn" onclick="calc('4')">4</button>
        <button class="calc-btn" onclick="calc('5')">5</button>
        <button class="calc-btn" onclick="calc('6')">6</button>
        <button class="calc-btn op" onclick="calc('-')">−</button>
        <button class="calc-btn" onclick="calc('1')">1</button>
        <button class="calc-btn" onclick="calc('2')">2</button>
        <button class="calc-btn" onclick="calc('3')">3</button>
        <button class="calc-btn op" onclick="calc('+')">+</button>
        <button class="calc-btn" onclick="calc('0')">0</button>
        <button class="calc-btn" onclick="calc('.')">.</button>
        <button class="calc-btn" onclick="calc('%')">%</button>
        <button class="calc-btn" onclick="calc('^')">^</button>
      </div>
    </div>
  </div>

  <!-- Study Panel -->
  <div class="panel" id="study-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('study-panel')">←</button>
      <span class="panel-title">Estudio</span>
    </div>
    <div class="panel-content">
      <div class="timer-display" id="timer-display">25:00</div>
      <div class="timer-btns">
        <button class="small-btn" onclick="setTimer(25)">25</button>
        <button class="small-btn" onclick="setTimer(5)">5</button>
        <button class="small-btn" onclick="setTimer(15)">15</button>
        <button class="small-btn" onclick="toggleTimer()">▶/⏸</button>
      </div>
      <textarea class="setup-input" id="study-notes" placeholder="Notas..." style="min-height:200px;margin-top:16px;"></textarea>
      <button class="btn" onclick="saveNotes()" style="margin-top:8px;width:100%;">💾 Guardar</button>
    </div>
  </div>

  <!-- Camera Panel -->
  <div class="panel" id="cam-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('cam-panel')">←</button>
      <span class="panel-title">Cámara</span>
    </div>
    <div class="panel-content">
      <video id="cam-video" autoplay playsinline></video>
      <canvas id="cam-canvas" style="display:none;"></canvas>
      <div style="display:flex;gap:8px;margin-top:12px;">
        <button class="btn" onclick="openCamera()" style="flex:1;">📷 Abrir</button>
        <button class="btn" onclick="takePhoto()" style="flex:1;">⭕ Capturar</button>
      </div>
    </div>
  </div>

  <!-- Translator Panel -->
  <div class="panel" id="trans-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('trans-panel')">←</button>
      <span class="panel-title">Traductor</span>
    </div>
    <div class="panel-content">
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <select id="trans-from" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);"><option value="es">Español</option><option value="en">English</option></select>
        <span style="align-self:center;">⇄</span>
        <select id="trans-to" style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);"><option value="en">English</option><option value="es">Español</option></select>
      </div>
      <textarea class="setup-input" id="trans-input" placeholder="Texto..." style="min-height:100px;"></textarea>
      <button class="btn" onclick="doTranslate()" style="width:100%;margin-top:8px;">🔄 Traducir</button>
      <div class="card" id="trans-output" style="min-height:80px;margin-top:12px;"></div>
    </div>
  </div>

  <!-- Currencies Panel -->
  <div class="panel" id="conv-panel">
    <div class="panel-header">
      <button class="back-btn" onclick="closePanel('conv-panel')">←</button>
      <span class="panel-title">Monedas</span>
    </div>
    <div class="panel-content">
      <input type="number" id="conv-amount" class="setup-input" value="1" oninput="convertCurrency()">
      <select id="conv-from" class="setup-input" onchange="convertCurrency()">
        <option value="USD">USD - Dólar</option>
        <option value="COP" selected>COP - Peso</option>
        <option value="EUR">EUR - Euro</option>
      </select>
      <select id="conv-to" class="setup-input" onchange="convertCurrency()">
        <option value="USD" selected>USD - Dólar</option>
        <option value="COP">COP - Peso</option>
        <option value="EUR">EUR - Euro</option>
      </select>
      <div style="text-align:center;font-size:24px;font-weight:700;color:var(--accent);padding:20px;" id="conv-result">...</div>
    </div>
  </div>

  <!-- Main Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">🍌</div>
      <span class="title">Banabna</span>
    </div>
    <button class="menu-btn" onclick="toggleMenu()">☰</button>
  </div>

  <!-- Messages -->
  <div class="msgs" id="msgs">
    <div class="msg bot">¡Hola! Soy <strong>Banabna</strong> 🍌 ¿En qué te ayudo?</div>
  </div>

  <!-- Input -->
  <div class="iarea">
    <textarea id="ui" placeholder="Escríbele..." rows="1"></textarea>
    <button class="sbtn" onclick="sendMessage()">➤</button>
  </div>

  <!-- Player -->
  <div class="player-bar" id="player-bar">
    <span style="flex:1;font-size:13px;">Lofi</span>
    <button class="small-btn" onclick="toggleMusic()">⏯</button>
  </div>

</div>
<script>
let chatHistory=[], userName=localStorage.getItem('banabna_name')||'', isDark=localStorage.getItem('banabna_theme')==='light', currentTab='chat', pendingImage=null, timerSec=25*60, timerRun=false, timerInt=null, player=null, camStream=null, calcExpr='', API='/';
const musicIcon='▶';

async function sendMessage(){
  const inp=document.getElementById('ui');
  let txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  addMsg('user',txt);
  chatHistory.push({role:'user',content:txt});
  const t=addMsg('bot','Escribo...');
  
  try{
    const res=await fetch(API+'chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:chatHistory,userName})
    });
    const d=await res.json();
    if(d.error)throw new Error(d.error);
    t.innerHTML=d.reply.replace(/\n/g,'<br>');
    chatHistory.push({role:'assistant',content:d.reply});
    localStorage.setItem('banabna_chat',JSON.stringify(chatHistory));
  }catch(e){t.innerHTML='Error: '+e.message;}
}

function quickSend(t){document.getElementById('ui').value=t;sendMessage();document.getElementById('menu-drop').classList.remove('show');}

function handleImage(e){

async function sendMessage(){
  if(!GROQ_API_KEY){alert('Falta API key. Edita el HTML.');return;}
  const inp=document.getElementById('ui');
  let txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  addMsg('user',txt);
  chatHistory.push({role:'user',content:txt});
  const t=addMsg('bot','Escribo...');
  
  try{
    let systemMsg = `Eres Banabna, asistente personal. Responde en español curto.`;
    if(userName) systemMsg += ` El usuario se llama ${userName}.`;
    
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+GROQ_API_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'llama-3.1-8b-instant',
        messages:[{role:'system',content:systemMsg},...chatHistory],
        max_tokens:300
      })
    });
    const d=await res.json();
    const reply=d.choices?.[0]?.message?.content||'Error';
    t.innerHTML=reply.replace(/\n/g,'<br>');
    chatHistory.push({role:'assistant',content:reply});
    localStorage.setItem('banabna_chat',JSON.stringify(chatHistory));
  }catch(e){t.innerHTML='Error: '+e.message;}
}

function init(){
  if(userName){
    document.getElementById('setup-panel').style.display='none';
  }
  applyTheme();
  const sc=localStorage.getItem('banabna_chat');
  if(sc)try{JSON.parse(sc).forEach(m=>addMsg(m.role,m.content));}catch{}
}

function saveName(){
  const n=document.getElementById('name-input').value.trim();
  if(!n){alert('Escribe tu nombre');return;}
  userName=n;
  localStorage.setItem('banabna_name',n);
  const panel=document.getElementById('setup-panel');
  if(panel){
    panel.style.display='none';
    panel.style.visibility='hidden';
    panel.style.pointerEvents='none';
  }
}

function applyTheme(){document.documentElement.setAttribute('data-theme',isDark?'dark':'light');}
function toggleTheme(){isDark=!isDark;localStorage.setItem('banabna_theme',isDark?'light':'dark');applyTheme();}

function toggleMenu(){document.getElementById('menu-drop').classList.toggle('show');}
document.addEventListener('click',e=>{
  if(!document.getElementById('menu-drop').contains(e.target)&&!e.target.classList.contains('menu-btn')){
    document.getElementById('menu-drop').classList.remove('show');
  }
});

function openPanel(id){document.getElementById(id).style.display='flex';document.getElementById('menu-drop').classList.remove('show');}
function closePanel(id){document.getElementById(id).style.display='none';}
function openCalc(){openPanel('calc-panel');}

function setTab(t,el){
  currentTab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
}

function addMsg(role,text){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=text.replace(/\n/g,'<br>');
  document.getElementById('msgs').appendChild(d);
  document.getElementById('msgs').scrollTop=document.getElementById('msgs').scrollHeight;
}

function quickSend(t){document.getElementById('ui').value=t;sendMessage();document.getElementById('menu-drop').classList.remove('show');}

function handleImage(e){
  const f=e.target.files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{pendingImage={data:ev.target.result.split(',')[1],type:f.type};};
  r.readAsDataURL(f);
}

function newChat(){
  chatHistory=[];
  document.getElementById('msgs').innerHTML='<div class="msg bot">¡Nuevo chat! 🍌</div>';
  localStorage.removeItem('banabna_chat');
  toggleMenu();
}

function renderHistory(){
  const s=JSON.parse(localStorage.getItem('banabna_history')||'[]');
  document.getElementById('history-list').innerHTML=s.length?s.map(x=>'<div class="item" onclick="loadHistory('+x.id+')"><span>'+x.preview+'</span><span style="color:var(--muted);font-size:11px;">'+new Date(x.date).toLocaleDateString()+'</span></div>').join(''):'<p style="color:var(--muted);text-align:center;">Sin historial</p>';
}
function loadHistory(id){
  const s=JSON.parse(localStorage.getItem('banabna_history')||'[]');
  const h=s.find(x=>x.id===id);
  if(h){chatHistory=h.messages;document.getElementById('msgs').innerHTML='';h.messages.forEach(m=>addMsg(m.role,m.content));}
  closePanel('history-panel');
}

// Calc
function calc(v){
  const d=document.getElementById('calc-display');
  if(v==='C'){calcExpr='';d.innerText='0';}
  else if(v==='='){try{d.innerText=eval(calcExpr.replace(/\^/,'**'));calcExpr=d.innerText;}catch{d.innerText='Error';calcExpr='';}}
  else{calcExpr+=v;d.innerText=calcExpr;}
}

// Timer
function setTimer(m){timerSec=m*60;timerRun=false;document.getElementById('timer-display').innerText=m+':00';}
function toggleTimer(){
  if(timerRun){clearInterval(timerInt);timerRun=false;}
  else{timerRun=true;timerInt=setInterval(()=>{timerSec--;document.getElementById('timer-display').innerText=Math.floor(timerSec/60)+':'+(timerSec%60).toString().padStart(2,'0');if(timerSec<=0){clearInterval(timerInt);timerRun=false;alert('¡Listo!');}},1000);}
}
function saveNotes(){localStorage.setItem('banabna_notes',document.getElementById('study-notes').value);alert('Guardado');}
const sn=localStorage.getItem('banabna_notes');if(sn)document.getElementById('study-notes').value=sn;

// Camera
async function openCamera(){try{camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});document.getElementById('cam-video').srcObject=camStream;}catch{alert('No cámara');}}
function takePhoto(){if(!camStream)return;const v=document.getElementById('cam-video');const c=document.getElementById('cam-canvas');c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);pendingImage={data:c.toDataURL('image/png').split(',')[1],type:'image/png'};closePanel('cam-panel');setTab('img',document.querySelector('.tab'));}

// Currency
async function convertCurrency(){
  const a=parseFloat(document.getElementById('conv-amount').value)||0;
  const f=document.getElementById('conv-from').value;
  const t=document.getElementById('conv-to').value;
  try{const d=await fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json());document.getElementById('conv-result').innerText=(a/d.rates[f]*d.rates[t]).toFixed(2)+' '+t;}catch{}
}

// Music
function toggleMusic(){
  const b=document.getElementById('player-bar');
  if(b.classList.contains('show')){player.pause();b.classList.remove('show');player=null;}
  else{player=new Audio('https://streams.ilovemusic.de/iloveradio17.mp3');player.loop=true;player.play().catch(()=>{});b.classList.add('show');}
}

// Translation
async function doTranslate(){
  const t=document.getElementById('trans-input').value;
  if(!t)return;
  document.getElementById('trans-output').innerText='...';
  try{const res=await fetch(API+'chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:'Translate from '+(document.getElementById('trans-from').value)+' to '+(document.getElementById('trans-to').value)+': '+t}]})});
  const d=await res.json();document.getElementById('trans-output').innerText=d.reply;}catch{document.getElementById('trans-output').innerText='Error';}
}
